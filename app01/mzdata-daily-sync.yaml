apiVersion: batch/v1
kind: CronJob
metadata:
  name: mzdata-daily-sync
spec:
  schedule: "30 7 * * *"       # 7:30 AM Local
  concurrencyPolicy: Forbid     # prevent overlap if job runs long
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          volumes:
            - name: rclone-config
              secret:
                secretName: blob-rclone-conf
          containers:
          - name: mount-rclone
            securityContext:
              privileged: true
            image: python:3.14-slim
            env:
              - name: DATA_DIR
                value: "/mnt/mzdata"
              - name: TEMP_DIR
                value: "/tmp/work"
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-token
                    key: HF_TOKEN
            command: ["sh", "-c"]
            args:
              - |
                set -e
                mkdir /mnt/mzdata
                mkdir /tmp/work
                
                ## SETTING UP DEPENDENCIES
                apt-get update && apt-get install -y fuse libfuse2 curl unzip rclone

                ## Install uv
                curl -LsSf https://astral.sh/uv/install.sh | sh 
                export PATH="$HOME/.local/bin:$PATH"
                . $HOME/.local/bin/env


                ## STEP1
                echo "Syncing the data from git to storage"
                ## ensuring 1tps otherwise mzstorage errors out
                rclone copy mzstorage:/files oci_s3:mzstorage/w2/ --progress -v --fast-list --retries-sleep 60s --config /config/rclone/rclone.conf
                rclone copy mzstorage:/ohlc oci_s3:mzstorage/ohlc-raw/ --progress -v --fast-list --retries-sleep 60s --config /config/rclone/rclone.conf
                echo "Syncing finished to storage"
                
                ### TODO SKIP MOUNTING THE ENTIRE DRIVE ###
                rclone mount --config /config/rclone/rclone.conf oci_s3:mzstorage /mnt/mzdata --read-only \
                  --allow-non-empty --allow-other -v &
                RCLONE_PID=$!

                sleep 5
                ls -l /mnt/mzdata

                curl -L -o /tmp/job.py "https://raw.githubusercontent.com/mnsrulz/mztrading-data/refs/heads/main/jobs/main-options-data-consolidate.py"

                echo "script downloaded now executing after 5 seconds"
                sleep 5
                
                uv run --with duckdb /tmp/job.py
                
                ## TODO COPY ONLY THE NEEDED DATA
                echo "Syncing the work back to storage"
                rclone copy /tmp/work oci_s3:mzstorage/ --progress -v --fast-list --config /config/rclone/rclone.conf
                echo "Copying to ocis3 done! Now copying to gdrive"
                rclone copy /tmp/work gdrive:/ODATA/ --progress -v --fast-list --config /config/rclone/rclone.conf
                echo "Copying to gdrive done! Now copying to seaweed s3"	
                rclone copy /tmp/work seaweed:/odata/ --progress -v	--fast-list --config /config/rclone/rclone.conf	
                echo "Copying to seaweed s3 done! Now syncing to HF!"
                
                uvx hf sync /mnt/mzdata/w2 hf://buckets/mnsrulz/mzstorage/files
                uvx hf sync /mnt/mzdata/ohlc-raw hf://buckets/mnsrulz/mzstorage/ohlc-raw
                uvx hf sync /tmp/work/w2-output hf://buckets/mnsrulz/mzstorage/w2-output
                
                echo "Sync completed!"
            volumeMounts:
              - mountPath: "/config/rclone/rclone.conf"
                name: rclone-config
                subPath: rclone.conf
